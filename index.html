<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>★ PIXI PHOTOBOOTH ★</title>
    <!-- Retro Arcade Font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #770737;
            --pink-light: #F8C8DC;
            --plum-medium: #673147;
        }

        * {
            box-sizing: border-box;
            font-family: 'Press Start 2P', monospace;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--pink-light);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.3rem;
            text-align: center;
            margin: 10px 0;
            text-shadow: 4px 4px 0px var(--plum-medium);
            letter-spacing: -1px;
        }

        /* Base Container Style */
        .booth-container {
            background: var(--plum-medium);
            border: 6px solid var(--pink-light);
            box-shadow: 8px 8px 0px #000;
            width: 100%;
            max-width: 430px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Screen Wrapper Setup */
        .screen-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4;
            background: #000;
            border: 4px solid var(--pink-light);
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mirror-view {
            transform: scaleX(-1);
        }

        .lighting-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            mix-blend-mode: overlay;
            pointer-events: none;
            z-index: 1;
            transition: background-color 0.2s ease;
        }

        .frame-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
            box-sizing: border-box;
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Frame Styles */
        .frame-classic { border: 16px solid var(--pink-light); border-bottom: 50px solid var(--pink-light); }
        .frame-classic::after { content: "• PURITY •"; position: absolute; bottom: -36px; left: 0; width: 100%; text-align: center; color: var(--bg-dark); font-size: 0.5rem; }
        .frame-playful { border: 12px dashed var(--pink-light); outline: 6px solid var(--bg-dark); outline-offset: -12px; }
        .frame-playful::before { content: "♥︎ CUTE ♥︎"; position: absolute; top: 14px; left: 14px; background: var(--bg-dark); padding: 4px; font-size: 0.5rem; }
        .frame-cyber { border: 8px double var(--pink-light); }
        .frame-cyber::after { content: "[ INSERT COIN ]"; position: absolute; bottom: 15px; right: 15px; background: #000; color: #ff4081; font-size: 0.45rem; padding: 4px; }

        /* UI Blocks */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-sidebar {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-group {
            border: 3px solid var(--bg-dark);
            padding: 8px;
            background: rgba(0,0,0,0.15);
        }

        label {
            font-size: 0.55rem;
            display: block;
            margin-bottom: 6px;
            text-transform: uppercase;
            color: var(--pink-light);
        }

        select, input[type="file"] {
            width: 100%;
            background: var(--bg-dark);
            border: 2px solid var(--pink-light);
            color: var(--pink-light);
            padding: 5px;
            font-size: 0.55rem;
            font-family: 'Press Start 2P', monospace;
            outline: none;
            cursor: pointer;
        }

        input[type="file"]::-webkit-file-upload-button {
            background: var(--pink-light);
            color: var(--bg-dark);
            border: 2px solid #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.5rem;
            cursor: pointer;
        }

        .utility-row {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .btn {
            background: #ff4081;
            color: white;
            border: 4px solid #fff;
            border-right-color: #c51162;
            border-bottom-color: #c51162;
            padding: 12px;
            font-size: 0.75rem;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 0px #000;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px #000;
            border-right-color: #fff;
            border-bottom-color: #fff;
        }

        .btn-secondary {
            background: var(--pink-light);
            color: var(--bg-dark);
            border-color: #fff var(--bg-dark) var(--bg-dark) #fff;
            padding: 8px;
            font-size: 0.55rem;
        }

        #snap-btn {
            width: 100%;
        }

        .flash {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: #fff; opacity: 0; z-index: 10; pointer-events: none;
        }
        .flash.active { animation: flashAnim 0.4s ease-out; }
        @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* ==========================================================================
           DESKTOP/LAPTOP DESIGN OVERRIDES (Resolves layout issue seen in image_85261c.jpg)
           ========================================================================== */
        @media (min-width: 768px) {
            body {
                justify-content: center; /* Centers container on screen */
                padding: 20px;
            }

            .booth-container {
                max-width: 95vw;
                width: auto;
                display: grid;
                grid-template-columns: auto 240px; /* Camera automatically sizes, right sidebar takes 240px */
                grid-template-rows: auto auto;
                gap: 15px;
            }

            /* No scroll dynamic layout setup */
            .screen-wrapper {
                grid-column: 1;
                grid-row: 1;
                width: auto;
                /* Limit camera height to 55% of monitor so everything displays perfectly on screen */
                height: 55vh; 
                aspect-ratio: 4 / 3; /* Standard widescreen landscape aspect ratio */
            }

            /* Moves Utility Actions directly into the right-side section */
            .action-sidebar {
                grid-column: 2;
                grid-row: 1;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                gap: 12px;
            }

            .utility-row {
                flex-direction: column;
                gap: 10px;
            }

            #snap-btn {
                height: 100%; /* Spans out to comfortably balance space on the side */
                min-height: 80px;
            }

            /* Forces controls panel into a unified horizontal bar at the bottom */
            .control-panel {
                grid-column: 1 / span 2;
                grid-row: 2;
                flex-direction: row;
                width: 100%;
            }

            .control-group {
                flex: 1; /* Each configuration card takes an equal portion of horizontal space */
            }
        }
    </style>
</head>
<body>

    <h1>★ PIXI PHOTOBOOTH ★</h1>

    <div class="booth-container">
        <!-- Main Camera Display -->
        <div class="screen-wrapper">
            <video id="video" class="mirror-view" autoplay playsinline muted></video>
            <div id="light-layer" class="lighting-overlay"></div>
            <div id="frame-layer" class="frame-overlay"></div>
            <div id="flash-layer" class="flash"></div>
        </div>

        <!-- Utility + Capture Sidebar (Appears on right side on desktop) -->
        <div class="action-sidebar">
            <div class="utility-row">
                <button id="flip-btn" class="btn btn-secondary">🔄 FLIP CAM</button>
                <button id="flash-btn" class="btn btn-secondary">⚡ FLASH: ON</button>
            </div>
            <button id="snap-btn" class="btn">CAPTURE PHOTO</button>
        </div>

        <!-- Customizations Control Panel (Stacks horizontally at bottom on desktop) -->
        <div class="control-panel">
            <!-- Frame Customization -->
            <div class="control-group">
                <label for="frame-select">1. Pixel Frame</label>
                <select id="frame-select">
                    <option value="none">No Frame</option>
                    <option value="classic">Classic Polaroid</option>
                    <option value="playful">Chunky Dash</option>
                    <option value="cyber">Retro Cabinet</option>
                </select>
                <label style="margin-top: 8px; margin-bottom: 4px;">Custom Frame Asset:</label>
                <input type="file" id="custom-file" accept="image/*">
            </div>

            <!-- Filters -->
            <div class="control-group">
                <label for="filter-select">2. FX Filter</label>
                <select id="filter-select">
                    <option value="none">Normal Color</option>
                    <option value="pixel">8-Bit Gameboy</option>
                    <option value="cyberpunk">Neon Magenta</option>
                    <option value="nostalgia">Warm Vintage</option>
                    <option value="mono">Noir Monochrome</option>
                </select>
            </div>

            <!-- Lighting Mode -->
            <div class="control-group">
                <label for="light-select">3. Stage Lighting</label>
                <select id="light-select">
                    <option value="normal">Default Light</option>
                    <option value="bright">Neon Bright</option>
                    <option value="moody">Moody Dim</option>
                    <option value="pink">Pastel Pink</option>
                    <option value="red">Cyber Red</option>
                    <option value="blue">Electric Blue</option>
                    <option value="green">Acid Green</option>
                    <option value="sunset">Blush Sunset</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Hidden Rendering Canvas -->
    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const lightLayer = document.getElementById('light-layer');
        const frameLayer = document.getElementById('frame-layer');
        const flashLayer = document.getElementById('flash-layer');
        
        const flipBtn = document.getElementById('flip-btn');
        const flashBtn = document.getElementById('flash-btn');
        const frameSelect = document.getElementById('frame-select');
        const customFile = document.getElementById('custom-file');
        const filterSelect = document.getElementById('filter-select');
        const lightSelect = document.getElementById('light-select');
        const snapBtn = document.getElementById('snap-btn');
        const canvas = document.getElementById('hidden-canvas');
        
        let currentStream = null;
        let videoTrack = null;
        let useFacingMode = "user"; 
        let flashEnabled = true;
        let userCustomImgSrc = null;
        
        async function initCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        
            try {
                const constraints = {
                    video: { facingMode: useFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                };
                
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                videoTrack = currentStream.getVideoTracks()[0];
        
                if (useFacingMode === "user") {
                    video.classList.add('mirror-view');
                } else {
                    video.classList.remove('mirror-view');
                }
            } catch (err) {
                alert("Camera unavailable!");
            }
        }
        
        flipBtn.addEventListener('click', () => {
            useFacingMode = (useFacingMode === "user") ? "environment" : "user";
            initCamera();
        });
        
        flashBtn.addEventListener('click', () => {
            flashEnabled = !flashEnabled;
            flashBtn.textContent = flashEnabled ? "⚡ FLASH: ON" : "❌ FLASH: OFF";
        });
        
        function updateBoothFX() {
            let filterString = "";
            let lightBg = "transparent";
        
            switch(filterSelect.value) {
                case 'pixel': filterString += "contrast(160%) grayscale(100%) sepia(40%) brightness(95%)"; break;
                case 'cyberpunk': filterString += "contrast(130%) hue-rotate(130deg) saturate(180%)"; break;
                case 'nostalgia': filterString += "sepia(50%) contrast(110%) brightness(105%)"; break;
                case 'mono': filterString += "grayscale(100%) contrast(150%)"; break;
            }
        
            switch(lightSelect.value) {
                case 'bright': filterString += " brightness(130%)"; break;
                case 'moody': filterString += " brightness(65%) contrast(125%)"; break;
                case 'pink': lightBg = "rgba(248, 200, 220, 0.4)"; break;
                case 'red': lightBg = "rgba(255, 0, 85, 0.4)"; break;
                case 'blue': lightBg = "rgba(0, 150, 255, 0.4)"; break;
                case 'green': lightBg = "rgba(0, 255, 100, 0.35)"; break;
                case 'sunset': lightBg = "rgba(255, 140, 0, 0.3) "; filterString += " sepia(25%)"; break;
            }
        
            video.style.filter = filterString;
            lightLayer.style.backgroundColor = lightBg;
        }
        
        frameSelect.addEventListener('change', () => {
            customFile.value = ""; 
            userCustomImgSrc = null;
            frameLayer.className = "frame-overlay"; 
            frameLayer.style.backgroundImage = "none";
        
            const val = frameSelect.value;
            if(val !== 'none') {
                frameLayer.classList.add('frame-' + val);
            }
        });
        
        customFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    frameLayer.className = "frame-overlay";
                    frameSelect.value = "none";
                    userCustomImgSrc = event.target.result;
                    frameLayer.style.backgroundImage = `url('${userCustomImgSrc}')`;
                };
                reader.readAsDataURL(file);
            }
        });
        
        filterSelect.addEventListener('change', updateBoothFX);
        lightSelect.addEventListener('change', updateBoothFX);
        
        snapBtn.addEventListener('click', async () => {
            let nativeFlashTriggered = false;
        
            if (flashEnabled && useFacingMode === "environment" && videoTrack) {
                try {
                    if ('ImageCapture' in window) {
                        const captureDevice = new ImageCapture(videoTrack);
                        const photoCapabilities = await captureDevice.getPhotoCapabilities();
                        if (photoCapabilities.fillLightMode && photoCapabilities.fillLightMode.includes('flash')) {
                            await videoTrack.applyConstraints({
                                advanced: [{ fillLightMode: "flash" }, { torch: true }]
                            });
                            nativeFlashTriggered = true;
                        }
                    }
                } catch (e) {
                    try {
                        await videoTrack.applyConstraints({ advanced: [{ torch: true }] });
                        nativeFlashTriggered = true;
                    } catch(legacyErr){}
                }
            }
        
            if (flashEnabled) {
                flashLayer.classList.add('active');
                setTimeout(() => flashLayer.classList.remove('active'), 400);
            }
        
            setTimeout(async () => {
                const ctx = canvas.getContext('2d');
        
                const displayWidth = video.clientWidth;
                const displayHeight = video.clientHeight;
                
                canvas.width = displayWidth * 2;
                canvas.height = displayHeight * 2;
        
                const vWidth = video.videoWidth;
                const vHeight = video.videoHeight;
                const targetAspect = displayWidth / displayHeight;
                const videoAspect = vWidth / vHeight;
        
                let sX, sY, sWidth, sHeight;
        
                if (videoAspect > targetAspect) {
                    sHeight = vHeight;
                    sWidth = vHeight * targetAspect;
                    sX = (vWidth - sWidth) / 2;
                    sY = 0;
                } else {
                    sWidth = vWidth;
                    sHeight = vWidth / targetAspect;
                    sX = 0;
                    sY = (vHeight - sHeight) / 2;
                }
        
                if (useFacingMode === "user") {
                    ctx.translate(canvas.width, 0);
                    ctx.scale(-1, 1);
                }
                
                ctx.filter = video.style.filter;
                ctx.drawImage(video, sX, sY, sWidth, sHeight, 0, 0, canvas.width, canvas.height);
                
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.filter = "none";
        
                if (nativeFlashTriggered && videoTrack) {
                    try {
                        await videoTrack.applyConstraints({
                            advanced: [{ fillLightMode: "off" }, { torch: false }]
                        });
                    } catch(err) {}
                }
        
                if (lightLayer.style.backgroundColor !== "transparent" && lightLayer.style.backgroundColor !== "") {
                    ctx.fillStyle = lightLayer.style.backgroundColor;
                    ctx.globalCompositeOperation = "overlay";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.globalCompositeOperation = "source-over";
                }
        
                if (userCustomImgSrc) {
                    const customImg = new Image();
                    customImg.onload = function() {
                        ctx.drawImage(customImg, 0, 0, canvas.width, canvas.height);
                        executeDownload();
                    };
                    customImg.src = userCustomImgSrc;
                    return; 
                }
        
                const frameStyle = frameSelect.value;
                if(frameStyle !== 'none') {
                    const scaleFactor = canvas.width / displayWidth;
                    const borderSize = 16 * scaleFactor;
                    
                    // RESET SCALE & MIRROR FOR FRAMES so alignments remain identical across both cameras
                    ctx.setTransform(1, 0, 0, 1, 0, 0); 
                    
                    ctx.lineWidth = borderSize;
                    ctx.strokeStyle = "#F8C8DC"; 
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
        
                    if(frameStyle === 'classic') {
                        const bottomBorderSize = 50 * scaleFactor;
                        ctx.strokeRect(borderSize/2, borderSize/2, canvas.width - borderSize, canvas.height - borderSize);
                        ctx.fillStyle = "#F8C8DC";
                        ctx.fillRect(0, canvas.height - bottomBorderSize, canvas.width, bottomBorderSize);
                        ctx.fillStyle = "#770737";
                        ctx.font = `bold ${Math.round(10 * scaleFactor)}px 'Press Start 2P', monospace`;
                        
                        ctx.fillText("• PURITY •", canvas.width / 2, canvas.height - (bottomBorderSize / 2));
                    } 
                    else if(frameStyle === 'playful') {
                        ctx.lineWidth = 12 * scaleFactor;
                        ctx.setLineDash([20 * scaleFactor, 20 * scaleFactor]);
                        ctx.strokeRect(ctx.lineWidth/2, ctx.lineWidth/2, canvas.width - ctx.lineWidth, canvas.height - ctx.lineWidth);
                        ctx.setLineDash([]); 
        
                        const boxX = 20 * scaleFactor;
                        const boxY = 20 * scaleFactor;
                        const boxW = 130 * scaleFactor;
                        const boxH = 36 * scaleFactor;
        
                        ctx.fillStyle = "#770737";
                        ctx.fillRect(boxX, boxY, boxW, boxH);
                        
                        ctx.fillStyle = "#F8C8DC";
                        ctx.font = `${Math.round(8 * scaleFactor)}px 'Press Start 2P', monospace`;
                        
                        // Absolute center calculation unwarped by camera matrix flips
                        ctx.fillText("♥︎CUTE♥︎", boxX + (boxW / 2), boxY + (boxH / 2) + (1 * scaleFactor));
                    } 
                    else if(frameStyle === 'cyber') {
                        ctx.lineWidth = 8 * scaleFactor;
                        ctx.strokeRect(ctx.lineWidth/2, ctx.lineWidth/2, canvas.width - ctx.lineWidth, canvas.height - ctx.lineWidth);
                        
                        const boxW = 190 * scaleFactor;
                        const boxH = 32 * scaleFactor;
                        const boxX = canvas.width - boxW - (20 * scaleFactor);
                        const boxY = canvas.height - boxH - (20 * scaleFactor);
        
                        ctx.fillStyle = "#000000";
                        ctx.fillRect(boxX, boxY, boxW, boxH);
                        
                        ctx.fillStyle = "#ff4081";
                        ctx.font = `${Math.round(8 * scaleFactor)}px 'Press Start 2P', monospace`;
                        
                        ctx.fillText("[ INSERT COIN ]", boxX + (boxW / 2), boxY + (boxH / 2) + (1 * scaleFactor));
                    }
                }
        
                executeDownload();
        
                function executeDownload() {
                    const dataURL = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = `pixel_booth_${Date.now()}.png`;
                    link.href = dataURL;
                    link.click();
                }
        
            }, flashEnabled ? 350 : 50);
        });
        
        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
